<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tacticalrogue · rig tuner</title>
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0c0c10;
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    color: #cbd2dc;
    overflow: hidden;
  }
  #stage {
    position: absolute; inset: 0;
  }
  #crumb {
    position: absolute; top: 10px; left: 14px;
    font-size: 12px; color: #60697a;
    background: rgba(14,16,22,0.7);
    padding: 6px 10px;
    border-radius: 4px;
    pointer-events: none;
    user-select: none;
  }
  #crumb b { color: #c9a87a; }
  #crumb span.hint { color: #566173; margin-left: 10px; }
  #export-toast {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1f2a18; border: 1px solid #3e5a2e;
    color: #a8d68a; padding: 8px 14px;
    border-radius: 4px; font-size: 12px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  #export-toast.show { opacity: 1; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/",
    "lil-gui": "https://unpkg.com/lil-gui@0.19.2/dist/lil-gui.esm.min.js"
  }
}
</script>
</head>
<body>
<div id="stage"></div>
<div id="crumb">
  <b>rig tuner</b> · drag to orbit · wheel to zoom
  <span class="hint">dims sliders on the right · "pose editor" → enable edit mode → click a body part → drag the gizmo rings · <b>R</b>=rotate · <b>T</b>=translate · <b>Ctrl+Z</b>=undo</span>
</div>
<div id="export-toast">Copied dims + colors to clipboard.</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import GUI from 'lil-gui';
import {
  buildRig, initAnim, updateAnim, DEFAULT_DIMS, POSE_TUNABLES,
} from '../src/actor_rig.js';

// ---------- scene ----------
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0c10);
scene.fog = new THREE.Fog(0x0c0c10, 18, 42);

const aspect = window.innerWidth / window.innerHeight;
const camera = new THREE.PerspectiveCamera(32, aspect, 0.1, 100);
camera.position.set(2.6, 2.0, 3.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 1.5;
controls.maxDistance = 12;
controls.update();

// Lighting: mirror scene.js so the colors match the in-game rendering.
scene.add(new THREE.HemisphereLight(0x3a4258, 0x06070a, 0.25));
const key = new THREE.DirectionalLight(0xffcf96, 1.25);
key.position.set(3.0, 4.0, 2.0);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
const s = 4;
key.shadow.camera.left = -s; key.shadow.camera.right = s;
key.shadow.camera.top = s;   key.shadow.camera.bottom = -s;
key.shadow.bias = -0.0005;
scene.add(key);
const fill = new THREE.DirectionalLight(0x2a3c5e, 0.35);
fill.position.set(-2.0, 1.5, -2.5);
scene.add(fill);
const rim = new THREE.DirectionalLight(0x6a88bf, 0.45);
rim.position.set(-1.0, 2.2, 3.5);
scene.add(rim);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x12141a, roughness: 0.95 }),
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
scene.add(new THREE.GridHelper(40, 40, 0x1a1c24, 0x0e1014));

// Reference 1m pillar so the scale of the rig is readable at a glance.
(() => {
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.02, 0.02, 1.85, 8),
    new THREE.MeshStandardMaterial({ color: 0x3a4050, roughness: 0.85 }),
  );
  pillar.position.set(1.4, 1.85 / 2, 0);
  scene.add(pillar);
  const cap = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, 0.005, 16),
    new THREE.MeshStandardMaterial({ color: 0xc9a87a }),
  );
  cap.position.set(1.4, 1.85, 0);
  scene.add(cap);
})();

// ---------- state ----------
// Deep clone so GUI edits are local — DEFAULT_DIMS stays pristine.
const state = {
  dims: structuredClone(DEFAULT_DIMS),
  colors: {
    body: 0x1c1e22,
    head: 0x141518,
    leg:  0x121317,
    arm:  0x1a1c20,
    hand: 0x0d0e10,
    gear: 0x2a2c30,
    boot: 0x0a0b0c,
  },
  pose: {
    preset: 'idle',
    freeze: false,
    speed: 0,
    aimYaw: 0,
    aimPitch: 0,
    aiming: 0,
    crouched: 0,
    rifleHold: false,
    meleeStance: false,
    dashing: false,
    // Edit-pose mode: when true, animation is paused and clicking a
    // body part attaches a rotation gizmo to its joint pivot.
    editPose: false,
  },
};

const POSE_PRESETS = {
  idle:        { speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 0, rifleHold: false, meleeStance: false, dashing: false },
  walk:        { speed: 1.8, aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 0, rifleHold: false, meleeStance: false, dashing: false },
  run:         { speed: 4.5, aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 0, rifleHold: false, meleeStance: false, dashing: false },
  aim:         { speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 1, crouched: 0, rifleHold: false, meleeStance: false, dashing: false },
  rifle:       { speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 1, crouched: 0, rifleHold: true,  meleeStance: false, dashing: false },
  crouch:      { speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 1, rifleHold: false, meleeStance: false, dashing: false },
  'crouch-aim':{ speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 1, crouched: 1, rifleHold: true,  meleeStance: false, dashing: false },
  melee:       { speed: 0,   aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 0, rifleHold: false, meleeStance: true,  dashing: false },
  dash:        { speed: 6.0, aimYaw: 0,    aimPitch: 0,   aiming: 0, crouched: 0, rifleHold: false, meleeStance: false, dashing: true  },
};

function applyPreset(name) {
  const p = POSE_PRESETS[name];
  if (!p) return;
  Object.assign(state.pose, p);
  state.pose.preset = name;
  // Reflect onto GUI controls so sliders match.
  for (const ctrl of poseControls) ctrl.updateDisplay();
  refreshGaitGate();
}

// Disable / re-enable gait-only sliders based on whether the rig is
// moving. Their effect is multiplied by gaitT (blendWalk+blendRun) so
// at speed=0 they have no visible effect; greying them out tells the
// user 'pick a walk/run preset to tune these'.
function refreshGaitGate() {
  const moving = (state.pose.speed || 0) > 0.01;
  for (const c of gaitOnlyCtrls) {
    if (!c) continue;
    if (moving) c.enable(); else c.disable();
  }
}

// ---------- rig ----------
let rig = null;
// Joint map: clickable mesh → { pivot, name }. Rebuilt each time the
// rig is re-instantiated so the gizmo always drives live geometry.
let jointMap = new Map();
let jointNames = new Map();       // pivot → display name (for editor label)
let selectedJoint = null;         // { pivot, name } or null
let refreshEditorUI = () => {};   // set later; called on selection change
let tControls = null;             // TransformControls, assigned below

function rebuildJointMap() {
  jointMap = new Map();
  jointNames = new Map();
  const reg = (mesh, pivot, name) => {
    if (mesh) jointMap.set(mesh, { pivot, name });
    jointNames.set(pivot, name);
  };
  reg(rig.pelvis,      rig.hips,    'hips');
  reg(rig.stomachMesh, rig.stomach, 'stomach');
  reg(rig.chestMesh,   rig.chest,   'chest');
  reg(rig.chestPlate,  rig.chest,   'chest');
  reg(rig.belt,        rig.chest,   'chest');
  reg(rig.collar,      rig.chest,   'chest');
  reg(rig.neckMesh,    rig.neck,    'neck');
  reg(rig.headMesh,    rig.head,    'head');
  reg(rig.jawMesh,     rig.head,    'head');
  for (const [side, arm] of [['left', rig.leftArm], ['right', rig.rightArm]]) {
    reg(arm.shoulder.mesh, arm.shoulder.pivot, `${side}Shoulder`);
    reg(arm.shoulderBulge, arm.shoulder.pivot, `${side}Shoulder`);
    reg(arm.shoulderPad,   arm.shoulder.pivot, `${side}Shoulder`);
    reg(arm.forearm.mesh,  arm.elbow,          `${side}Elbow`);
    reg(arm.elbowBulge,    arm.elbow,          `${side}Elbow`);
    reg(arm.wristCuff,     arm.elbow,          `${side}Elbow`);
    reg(arm.hand.mesh,     arm.wrist,          `${side}Wrist`);
  }
  for (const [side, leg] of [['left', rig.leftLeg], ['right', rig.rightLeg]]) {
    reg(leg.thigh.mesh, leg.thigh.pivot, `${side}Thigh`);
    reg(leg.hipBulge,   leg.thigh.pivot, `${side}Thigh`);
    reg(leg.thighRig,   leg.thigh.pivot, `${side}Thigh`);
    reg(leg.calf.mesh,  leg.knee,        `${side}Knee`);
    reg(leg.kneeBulge,  leg.knee,        `${side}Knee`);
    reg(leg.kneePad,    leg.knee,        `${side}Knee`);
    reg(leg.bootTop,    leg.knee,        `${side}Knee`);
    reg(leg.foot.mesh,  leg.ankle,       `${side}Ankle`);
  }
}

function rebuildRig() {
  if (rig) {
    scene.remove(rig.group);
    rig.group.traverse((o) => {
      if (o.isMesh) {
        o.geometry?.dispose?.();
        // Don't dispose shared materials blindly (toon gradient map is
        // shared globally). The handful of materials leak between
        // rebuilds — fine for a dev tool.
      }
    });
  }
  rig = buildRig({
    scale: 1.0,
    dims: state.dims,
    bodyColor: state.colors.body,
    headColor: state.colors.head,
    legColor:  state.colors.leg,
    armColor:  state.colors.arm,
    handColor: state.colors.hand,
    gearColor: state.colors.gear,
    bootColor: state.colors.boot,
  });
  initAnim(rig);
  scene.add(rig.group);
  rebuildJointMap();
  // Stale pivot references from the previous rig are gone — drop any
  // active gizmo attachment.
  if (tControls?.object) {
    tControls.detach();
  }
  selectedJoint = null;
  refreshEditorUI();
}
rebuildRig();

// ---------- pose-editor gizmo ----------
// TransformControls in rotate mode gives x/y/z ring handles around the
// attached object. Attaching to a joint PIVOT group lets the user
// rotate the limb by dragging one of the rings. We disable orbit
// during drag so the camera doesn't fight the gizmo.
tControls = new TransformControls(camera, renderer.domElement);
tControls.setMode('rotate');
tControls.setSize(0.85);
tControls.addEventListener('dragging-changed', (e) => {
  controls.enabled = !e.value;
  // Push a snapshot at the moment a drag starts, before any rotation
  // has been written. Skip if we're mid-restore.
  if (e.value && typeof pushUndo === 'function' && !isRestoring) pushUndo();
});
tControls.addEventListener('change', () => refreshEditorUI());
scene.add(tControls);

// Raycast click-to-select. Only fires in edit-pose mode, and skips
// clicks that hit the gizmo itself (TransformControls sets its own
// dragging state when you grab a handle).
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener('pointerdown', (e) => {
  if (!state.pose.editPose) return;
  if (tControls.dragging) return;
  if (e.button !== 0) return;                      // left click only
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = Array.from(jointMap.keys());
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length > 0) {
    const entry = jointMap.get(hits[0].object);
    selectJoint(entry);
  } else {
    selectJoint(null);
  }
});

function selectJoint(entry) {
  if (!entry) {
    tControls.detach();
    selectedJoint = null;
  } else {
    tControls.attach(entry.pivot);
    selectedJoint = entry;
  }
  refreshEditorUI();
}

function setEditPose(on) {
  state.pose.editPose = on;
  if (!on) {
    selectJoint(null);
  }
  refreshEditorUI();
}

// ---------- GUI ----------
const gui = new GUI({ title: 'rig · tuner' });
gui.domElement.style.setProperty('--width', '340px');
gui.domElement.style.maxHeight = '95vh';
gui.domElement.style.overflowY = 'auto';

// Collect every control so preset-applies can refresh displays.
const poseControls = [];

// --- undo stack ----------------------------------------------------
// A simple snapshot history. Push before any destructive change
// (slider drag start, gizmo drag start, IK target drag start, button-
// based mutations like reset / zero). Ctrl+Z pops the latest snapshot
// and restores it. Cap depth so the editor doesn't grow unbounded.
const UNDO_DEPTH = 80;
const undoStack = [];

function snapshot() {
  // Capture every joint pivot rotation so a gizmo edit can be undone
  // even after subsequent slider changes.
  const jointRots = {};
  for (const [pivot, name] of jointNames) {
    jointRots[name + '@' + pivot.uuid] = {
      uuid: pivot.uuid,
      rot: { x: pivot.rotation.x, y: pivot.rotation.y, z: pivot.rotation.z },
    };
  }
  // IK target world positions (only enabled ones move).
  const ikTargets = {};
  for (const [name, mesh] of Object.entries(ikTargetMeshes)) {
    ikTargets[name] = { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z };
  }
  // IK enable + selected.
  const ikSt = {};
  for (const k of Object.keys(ikState)) {
    if (k === 'selected') { ikSt.selected = ikState.selected; continue; }
    ikSt[k] = { enabled: ikState[k].enabled };
  }
  return {
    dims: structuredClone(state.dims),
    colors: { ...state.colors },
    pose: { ...state.pose },
    tunables: structuredClone(POSE_TUNABLES),
    jointRots,
    ikTargets,
    ikSt,
    selectedJointName: selectedJoint?.name ?? null,
  };
}

function pushUndo() {
  undoStack.push(snapshot());
  if (undoStack.length > UNDO_DEPTH) undoStack.shift();
}

let isRestoring = false;    // guard so restore() doesn't re-trigger pushUndo
function restore(snap) {
  if (!snap) return;
  isRestoring = true;
  try {
    // dims — reassign object so all GUI bindings (which capture the
    // object reference) keep working. structuredClone keeps undo
    // entries independent.
    Object.assign(state.dims, snap.dims);
    // colors
    Object.assign(state.colors, snap.colors);
    // pose state
    Object.assign(state.pose, snap.pose);
    // procedural pose tunables
    for (const k of Object.keys(snap.tunables.crouch)) {
      POSE_TUNABLES.crouch[k] = snap.tunables.crouch[k];
    }
    // IK enable flags + target positions. Apply enable BEFORE moving
    // targets so visibility/gizmo attach state matches.
    for (const k of Object.keys(snap.ikSt)) {
      if (k === 'selected') continue;
      const wasOn = ikState[k].enabled;
      const wantOn = snap.ikSt[k].enabled;
      if (wasOn !== wantOn) setIkEnabled(k, wantOn);
    }
    if (snap.ikSt.selected) selectIkTarget(snap.ikSt.selected);
    for (const [name, p] of Object.entries(snap.ikTargets)) {
      ikTargetMeshes[name].position.set(p.x, p.y, p.z);
    }
    // Rebuild rig with restored dims/colors so the visible rig matches
    // what the snapshot captured.
    rebuildRig();
    // After rebuild, jointMap has fresh pivots — restore by NAME, not
    // by uuid (uuids change with rebuild). For each captured rotation,
    // find the pivot whose registered name matches and apply.
    const rotsByName = {};
    for (const key of Object.keys(snap.jointRots)) {
      const entry = snap.jointRots[key];
      const name = key.split('@')[0];
      // Last write wins; chest etc. has multiple meshes registered for
      // the same pivot so values agree.
      rotsByName[name] = entry.rot;
    }
    for (const [pivot, name] of jointNames) {
      const r = rotsByName[name];
      if (r) pivot.rotation.set(r.x, r.y, r.z);
    }
    // Refresh all GUI controllers so sliders match the restored state.
    gui.controllersRecursive().forEach(c => c.updateDisplay());
    refreshEditorUI();
  } finally {
    isRestoring = false;
  }
}

window.addEventListener('keydown', (e) => {
  // Ctrl+Z (or Cmd+Z) — pop one snapshot. Ignore when typing into an
  // input/textarea (lil-gui number fields).
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (undoStack.length === 0) return;
    const snap = undoStack.pop();
    restore(snap);
    const toast = document.getElementById('export-toast');
    toast.textContent = `Undone (${undoStack.length} steps remaining)`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1100);
  }
});

// R / T hotkeys to flip the joint-rotate gizmo between rotate /
// translate modes. Mirrors the standard DCC-tool convention. The IK
// target gizmo always stays in translate mode (you can't rotate a
// point target). Skip while typing into a number field so the keys
// don't fight numeric input.
window.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName) || '';
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if (k === 'r') {
    tControls.setMode('rotate');
    showHotkeyToast('Gizmo: ROTATE');
  } else if (k === 't') {
    tControls.setMode('translate');
    showHotkeyToast('Gizmo: TRANSLATE');
  }
});
function showHotkeyToast(msg) {
  const toast = document.getElementById('export-toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 900);
}

// Slider / dropdown / checkbox / color undo: any pointerdown inside
// the lil-gui panel pushes a single snapshot for that interaction.
// A pointerup clears the latch so the next interaction pushes again.
// Buttons that mutate state call pushUndo() inline (see button bodies);
// this listener only covers controllers that don't.
let _guiPressed = false;
gui.domElement.addEventListener('pointerdown', () => {
  if (isRestoring || _guiPressed) return;
  pushUndo();
  _guiPressed = true;
}, true);
window.addEventListener('pointerup',     () => { _guiPressed = false; }, true);
window.addEventListener('pointercancel', () => { _guiPressed = false; }, true);
// Keyboard editing of a number field — push on the first keystroke
// per focus session, then suppress until blur.
let _kbField = null;
gui.domElement.addEventListener('keydown', (e) => {
  if (isRestoring) return;
  const tgt = e.target;
  if (!(tgt instanceof HTMLInputElement)) return;
  // Skip pure cursor keys / modifiers.
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight'
      || e.key === 'Home' || e.key === 'End'
      || e.key === 'Tab' || e.key === 'Shift' || e.key === 'Control'
      || e.key === 'Meta' || e.key === 'Alt') return;
  if (_kbField === tgt) return;
  pushUndo();
  _kbField = tgt;
}, true);
gui.domElement.addEventListener('focusout', () => { _kbField = null; }, true);

// --- pose ---
{
  const f = gui.addFolder('pose');
  f.add(state.pose, 'preset', Object.keys(POSE_PRESETS)).name('preset').onChange(applyPreset);
  poseControls.push(f.add(state.pose, 'freeze').name('freeze (pause anim)'));
  poseControls.push(f.add(state.pose, 'speed', 0, 6, 0.05).name('speed (walk/run)').onChange(() => refreshGaitGate()));
  poseControls.push(f.add(state.pose, 'aimYaw',  -1.5, 1.5, 0.01).name('aim yaw'));
  poseControls.push(f.add(state.pose, 'aimPitch',-1.2, 1.2, 0.01).name('aim pitch'));
  poseControls.push(f.add(state.pose, 'aiming',  0, 1, 0.01).name('aim blend'));
  poseControls.push(f.add(state.pose, 'crouched',0, 1, 0.01).name('crouch'));
  poseControls.push(f.add(state.pose, 'rifleHold').name('rifle hold'));
  poseControls.push(f.add(state.pose, 'meleeStance').name('melee stance'));
  poseControls.push(f.add(state.pose, 'dashing').name('dashing'));
}

// --- pose editor (click-to-select + rotate gizmo) ---
{
  const f = gui.addFolder('pose editor');
  const labelProxy = { selected: '(none)' };
  const ed = f.add(state.pose, 'editPose').name('edit mode (click parts)');
  ed.onChange((on) => setEditPose(on));
  const labelCtrl = f.add(labelProxy, 'selected').disable().listen();
  f.add({
    mode: 'rotate',
  }, 'mode', ['rotate', 'translate']).name('gizmo mode').onChange((m) => {
    tControls.setMode(m);
  });
  f.add({
    deselect: () => selectJoint(null),
  }, 'deselect').name('deselect');
  f.add({
    zero: () => {
      if (!selectedJoint) return;
      pushUndo();
      selectedJoint.pivot.rotation.set(0, 0, 0);
      refreshEditorUI();
    },
  }, 'zero').name('zero selected rotation');
  f.add({
    zeroAll: () => {
      pushUndo();
      for (const pivot of jointNames.keys()) pivot.rotation.set(0, 0, 0);
      refreshEditorUI();
    },
  }, 'zeroAll').name('zero ALL rotations');
  f.add({
    exportPose: () => {
      const pose = {};
      // Also capture the bag of transient rotations that updateAnim
      // normally controls — position writes too (hips.position.y).
      for (const [pivot, name] of jointNames) {
        const r = pivot.rotation;
        const eps = 1e-4;
        if (Math.abs(r.x) > eps || Math.abs(r.y) > eps || Math.abs(r.z) > eps) {
          pose[name] = {
            x: +r.x.toFixed(4),
            y: +r.y.toFixed(4),
            z: +r.z.toFixed(4),
          };
        }
      }
      const json = JSON.stringify({ pose }, null, 2);
      const toast = document.getElementById('export-toast');
      navigator.clipboard?.writeText(json).then(
        () => {
          toast.textContent = 'Copied pose to clipboard.';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 1600);
        },
        () => { console.warn('[rig tuner] clipboard write failed'); },
      );

// --- dims ---
// Walk the DEFAULT_DIMS tree and make a slider for every numeric leaf.
// Range heuristic: clamp to [0, 2x default] with a sensible min step.
// Booleans and non-numeric keys are skipped (none currently, but a
// guard rail for future additions).
function rangeFor(value) {
  const a = Math.abs(value);
  if (a === 0) return { min: -0.5, max: 0.5, step: 0.005 };
  if (a < 0.05) return { min: -a * 3, max: a * 3, step: 0.001 };
  if (a < 0.5)  return { min: 0, max: a * 2.5, step: 0.005 };
  return { min: 0, max: a * 2, step: 0.01 };
}

function addDimsFolder(gui, obj, path) {
  for (const [k, v] of Object.entries(obj)) {
    if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
      const sub = gui.addFolder(k);
      sub.close();
      addDimsFolder(sub, v, [...path, k]);
    } else if (typeof v === 'number') {
      const { min, max, step } = rangeFor(v);
      gui.add(obj, k, min, max, step).onChange(() => rebuildRig());
    }
  }
}

let dimsFolder = gui.addFolder('dimensions');
addDimsFolder(dimsFolder, state.dims, []);

// --- IK targets (constrained two-bone analytic for arms/legs, look-at for head) ---
// Each target is a small sphere with TransformControls in translate
// mode. When a chain's IK is enabled, that chain is solved AFTER
// updateAnim() runs each frame, overriding the procedural pose for
// just that chain. Targets are clamped to within (sumBoneLengths)
// of the chain root; clamped targets render red so it's obvious the
// reach is being limited.
const ikChains = {};

function addIkTarget(name, color) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.05, 16, 12),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85, depthTest: false }),
  );
  mesh.renderOrder = 999;
  mesh.userData.ikTarget = name;
  mesh.visible = false;
  scene.add(mesh);
  return mesh;
}

const ikTargetMeshes = {
  leftHand:  addIkTarget('leftHand',  0x6abf6a),
  rightHand: addIkTarget('rightHand', 0xbf6a6a),
  head:      addIkTarget('head',      0x6abfff),
  leftFoot:  addIkTarget('leftFoot',  0x9a8a6a),
  rightFoot: addIkTarget('rightFoot', 0xa86060),
};

const ikState = {
  leftHand:  { enabled: false, clamped: false },
  rightHand: { enabled: false, clamped: false },
  head:      { enabled: false, clamped: false },
  leftFoot:  { enabled: false, clamped: false },
  rightFoot: { enabled: false, clamped: false },
  selected: 'leftHand',
};

// Separate TransformControls instance for IK targets — keeps it from
// fighting the joint-rotate gizmo (different selection model).
const ikControls = new TransformControls(camera, renderer.domElement);
ikControls.setMode('translate');
ikControls.setSize(0.6);
ikControls.addEventListener('dragging-changed', (e) => {
  controls.enabled = !e.value;
  if (e.value && typeof pushUndo === 'function' && !isRestoring) pushUndo();
});
scene.add(ikControls);

function selectIkTarget(name) {
  ikState.selected = name;
  if (ikState[name]?.enabled) {
    ikControls.attach(ikTargetMeshes[name]);
  } else {
    ikControls.detach();
  }
}

function setIkEnabled(name, on) {
  ikState[name].enabled = on;
  ikTargetMeshes[name].visible = on;
  if (on) {
    // Seed target at the chain's current end-effector world position so
    // turning IK on doesn't snap the pose.
    const end = ikChainEndPose(name);
    if (end) ikTargetMeshes[name].position.copy(end);
    if (ikState.selected === name) ikControls.attach(ikTargetMeshes[name]);
  } else if (ikControls.object === ikTargetMeshes[name]) {
    ikControls.detach();
  }
}

// Where is the chain's current end-effector? Used to seed the target
// when IK is first turned on.
function ikChainEndPose(name) {
  const v = new THREE.Vector3();
  switch (name) {
    case 'leftHand':  rig.leftArm.hand.mesh.getWorldPosition(v); return v;
    case 'rightHand': rig.rightArm.hand.mesh.getWorldPosition(v); return v;
    case 'head':      rig.head.getWorldPosition(v); return v;
    case 'leftFoot':  rig.leftLeg.foot.mesh.getWorldPosition(v); return v;
    case 'rightFoot': rig.rightLeg.foot.mesh.getWorldPosition(v); return v;
  }
  return null;
}

// Two-bone analytic IK. Given:
//   rootPivot   — Object3D (the upper-bone joint)
//   midPivot    — Object3D (the lower-bone joint, child of root)
//   endPivot    — Object3D (the wrist/ankle, child of mid)
//   targetWorld — THREE.Vector3 in world space
//   upperLen, lowerLen
//   poleHint    — local-frame unit vector for "which way the elbow/knee bends"
// Solves rootPivot.rotation + midPivot.rotation so endPivot ends near
// target. Clamps target distance to (upperLen + lowerLen) so the chain
// never tries to over-extend (returns clamped: bool).
const _vA = new THREE.Vector3(), _vB = new THREE.Vector3(), _vC = new THREE.Vector3();
const _qA = new THREE.Quaternion(), _qB = new THREE.Quaternion();
const _mA = new THREE.Matrix4();
function solveTwoBoneIK(rootPivot, midPivot, upperLen, lowerLen, targetWorld, poleHint) {
  // 1) target in root-local space
  rootPivot.parent.updateWorldMatrix(true, false);
  _mA.copy(rootPivot.parent.matrixWorld).invert();
  _vA.copy(targetWorld).applyMatrix4(_mA);
  // root pivot offset within parent (rootPivot.position is the joint origin)
  _vA.sub(rootPivot.position);
  // 2) clamp distance
  const reach = upperLen + lowerLen;
  const minReach = Math.abs(upperLen - lowerLen) * 1.02;
  let clamped = false;
  let d = _vA.length();
  if (d > reach * 0.999) { _vA.multiplyScalar(reach * 0.999 / d); d = reach * 0.999; clamped = true; }
  if (d < minReach)      { _vA.normalize().multiplyScalar(minReach); d = minReach; clamped = true; }
  // 3) law of cosines for elbow/knee bend angle
  const a = upperLen, b = lowerLen;
  const cosKnee = Math.max(-1, Math.min(1, (a*a + b*b - d*d) / (2 * a * b)));
  const kneeAngle = Math.PI - Math.acos(cosKnee); // 0 = straight, π = fully folded
  // 4) thigh/shoulder pitch — solve the upper-bone angle so the chain reaches the target
  // Place the chain in the plane defined by `_vA` (root→target) and the pole hint.
  // The upper bone makes angle α with the root→target vector where
  //     cos α = (a² + d² − b²) / (2ad)
  const cosUpper = Math.max(-1, Math.min(1, (a*a + d*d - b*b) / (2 * a * d)));
  const upperAngle = Math.acos(cosUpper);
  // Build a basis: forward = root→target normalized, pole = poleHint perp to forward
  const fwd = _vB.copy(_vA).normalize();
  const pole = _vC.copy(poleHint).sub(fwd.clone().multiplyScalar(_vC.dot(fwd))).normalize();
  // If poleHint was parallel to forward, fall back to world up
  if (!isFinite(pole.x) || pole.lengthSq() < 1e-4) pole.set(0, 1, 0);
  // Upper bone direction: rotate forward toward pole by upperAngle
  const upper = new THREE.Vector3()
    .copy(fwd).multiplyScalar(Math.cos(upperAngle))
    .addScaledVector(pole, Math.sin(upperAngle));
  // Convert upper-bone direction into a thigh/shoulder rotation. The
  // upper bone in this rig hangs DOWN at rest (local +Y to -Y). So
  // we want a quaternion that rotates (0, -1, 0) into `upper`.
  _qA.setFromUnitVectors(new THREE.Vector3(0, -1, 0), upper);
  rootPivot.quaternion.copy(_qA);
  // Mid bone — bend by `kneeAngle` in the plane (forward × pole).
  // The natural bend axis in the upper-bone's local frame is `pole`
  // rotated into local frame by inverse of root quaternion.
  const localPole = pole.clone().applyQuaternion(_qA.clone().invert());
  // For elbow/knee: rotate around the local pole axis by kneeAngle
  _qB.setFromAxisAngle(new THREE.Vector3(1, 0, 0), kneeAngle);
  // Use the X-axis hinge (the rig's knee/elbow rotates around its
  // local X) — the rig is built with X as the bend axis, so a single
  // rotation.x = kneeAngle is the canonical bend.
  void localPole;
  midPivot.quaternion.copy(_qB);
  return clamped;
}

// Estimate bone segment lengths from rig dims, scaled by the rig.
function ikBoneLens() {
  const rs = rig.scale;
  const dims = rig.dims;
  return {
    upperArm: dims.arms.upperArmH * rs,
    forearm:  dims.arms.forearmH * rs,
    thigh:    dims.legs.thighH * rs,
    calf:     dims.legs.calfH * rs,
  };
}

function applyIK() {
  // Early-out if nothing's enabled — keeps the render loop alive even
  // if ikBoneLens or the solver later throws.
  const anyOn = ikState.leftHand.enabled || ikState.rightHand.enabled
    || ikState.head.enabled || ikState.leftFoot.enabled || ikState.rightFoot.enabled;
  if (!anyOn) return;
  const lens = ikBoneLens();
  // Arms — pole hints point forward (-Z) so elbows pop forward when
  // wrists are near the chest, which reads as a "ready to punch" stance
  // rather than chicken-winging.
  const armPole = new THREE.Vector3(0, 0, -1);
  if (ikState.leftHand.enabled) {
    ikState.leftHand.clamped = solveTwoBoneIK(
      rig.leftArm.shoulder.pivot, rig.leftArm.elbow,
      lens.upperArm, lens.forearm,
      ikTargetMeshes.leftHand.position, armPole,
    );
  }
  if (ikState.rightHand.enabled) {
    ikState.rightHand.clamped = solveTwoBoneIK(
      rig.rightArm.shoulder.pivot, rig.rightArm.elbow,
      lens.upperArm, lens.forearm,
      ikTargetMeshes.rightHand.position, armPole,
    );
  }
  // Legs — pole hint points forward (knees bend forward).
  const legPole = new THREE.Vector3(0, 0, 1);
  if (ikState.leftFoot.enabled) {
    ikState.leftFoot.clamped = solveTwoBoneIK(
      rig.leftLeg.thigh.pivot, rig.leftLeg.knee,
      lens.thigh, lens.calf,
      ikTargetMeshes.leftFoot.position, legPole,
    );
  }
  if (ikState.rightFoot.enabled) {
    ikState.rightFoot.clamped = solveTwoBoneIK(
      rig.rightLeg.thigh.pivot, rig.rightLeg.knee,
      lens.thigh, lens.calf,
      ikTargetMeshes.rightFoot.position, legPole,
    );
  }
  // Head — look-at IK. Just orient the head pivot toward the target.
  if (ikState.head.enabled) {
    rig.head.parent.updateWorldMatrix(true, false);
    const headParentInv = new THREE.Matrix4().copy(rig.head.parent.matrixWorld).invert();
    const localTarget = ikTargetMeshes.head.position.clone().applyMatrix4(headParentInv).sub(rig.head.position);
    // Clamp head IK target to neckMaxReach so an absurd target doesn't
    // produce comical neck angles.
    const reach = 0.5;
    if (localTarget.length() > reach) {
      localTarget.normalize().multiplyScalar(reach);
      ikState.head.clamped = true;
    } else {
      ikState.head.clamped = false;
    }
    // Yaw + pitch only (no roll) — head-up-vector stays world-up so the
    // face doesn't tilt sideways.
    const yaw = Math.atan2(localTarget.x, localTarget.z);
    const pitch = -Math.atan2(localTarget.y, Math.hypot(localTarget.x, localTarget.z));
    rig.head.rotation.set(pitch, yaw, 0);
  }
  // Update target colors based on clamp state.
  for (const [name, st] of Object.entries(ikState)) {
    if (name === 'selected') continue;
    if (!ikTargetMeshes[name]) continue;
    const baseColor = {
      leftHand: 0x6abf6a, rightHand: 0xbf6a6a, head: 0x6abfff,
      leftFoot: 0x9a8a6a, rightFoot: 0xa86060,
    }[name];
    ikTargetMeshes[name].material.color.setHex(st.clamped ? 0xff3030 : baseColor);
  }
}

// IK GUI
{
  const f = gui.addFolder('IK targets');
  f.close();
  f.add({
    selected: 'leftHand',
  }, 'selected', ['leftHand', 'rightHand', 'head', 'leftFoot', 'rightFoot'])
    .name('selected target')
    .onChange((n) => selectIkTarget(n));
  for (const name of ['leftHand', 'rightHand', 'head', 'leftFoot', 'rightFoot']) {
    f.add({
      [name]: false,
    }, name).name(`enable ${name}`).onChange((on) => setIkEnabled(name, on));
  }
  f.add({
    seedAll: () => {
      pushUndo();
      for (const name of Object.keys(ikTargetMeshes)) {
        const v = ikChainEndPose(name);
        if (v) ikTargetMeshes[name].position.copy(v);
      }
    },
  }, 'seedAll').name('seed targets at current pose');
  f.add({
    disableAll: () => {
      pushUndo();
      for (const name of Object.keys(ikTargetMeshes)) setIkEnabled(name, false);
      gui.controllersRecursive().forEach(c => c.updateDisplay());
    },
  }, 'disableAll').name('disable all');
}

// --- actions ---
{
  const f = gui.addFolder('actions');
  const toast = document.getElementById('export-toast');
  const showToast = (msg) => {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1600);
  };
  f.add({
    export: () => {
      const payload = {
        dims: state.dims,
        colors: state.colors,
      };
      const json = JSON.stringify(payload, null, 2);
      navigator.clipboard?.writeText(json).then(
        () => showToast('Copied dims + colors to clipboard.'),
        () => showToast('Copy failed — see console.'),
      );
      console.log('[rig tuner] exported payload:\n' + json);
    },
  }, 'export').name('export → clipboard');
  f.add({
    reset: () => {
      pushUndo();
      state.dims = structuredClone(DEFAULT_DIMS);
      state.pose.preset = 'idle';
      applyPreset('idle');
      // Rebuild the dims folder: destroy and re-add.
      dimsFolder.destroy();
      dimsFolder = gui.addFolder('dimensions');
      addDimsFolder(dimsFolder, state.dims, []);
      rebuildRig();
      showToast('Reset to defaults.');
    },
  }, 'reset').name('reset dims');
  f.add({
    log: () => {
      console.log('[rig tuner] current state:', {
        dims: state.dims, colors: state.colors, pose: state.pose,
      });
      showToast('Logged to console.');
    },
  }, 'log').name('log to console');
}

// ---------- loop ----------
let last = performance.now() / 1000;
function tick() {
  const now = performance.now() / 1000;
  const dt = Math.min(0.05, now - last);
  last = now;

  // In edit mode, updateAnim is suppressed so gizmo-driven rotations
  // stick. The normal `freeze` flag still works the same way when not
  // in edit mode.
  if (!state.pose.freeze && !state.pose.editPose) {
    updateAnim(rig, state.pose, dt);
  }
  // IK runs after updateAnim so it overrides the procedural pose for
  // the selected chains. In edit-pose mode it's still useful — the
  // user may pose by gizmo on some joints and IK on others.
  if (rig) applyIK();
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
refreshGaitGate();   // initial pass — disable gait-only sliders if starting in idle
tick();

// ---------- resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
