<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mission Control</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='14' font-size='14'%3E🛰%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="topbar">
    <div class="title">🛰 Mission Control</div>
    <div id="project-pill" class="pill">project: —</div>
    <div class="spacer"></div>
    <div id="last-updated" class="muted">—</div>
  </header>

  <main>
    <!-- 4-quadrant team grid -->
    <section class="grid quadrants">
      <article class="card" id="card-claudie"></article>
      <article class="card" id="card-newsie"></article>
      <article class="card" id="card-thinkie"></article>
      <article class="card" id="card-sortie"></article>
    </section>

    <!-- Background workers (compact) -->
    <section class="bg-row">
      <div class="bg-card" id="card-wrenchy"></div>
      <div class="bg-card" id="card-sage"></div>
    </section>

    <!-- Launch / services panel -->
    <section class="services">
      <h2>Services</h2>
      <div id="services-list"></div>
    </section>

    <!-- Activity feed -->
    <section class="activity">
      <h2>Recent Activity</h2>
      <ul id="activity-list"></ul>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
